<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome Home, Baby</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #fff7f0;
      --soft-white: #fffdfb;
      --pastel-pink: #f8d7df;
      --rose: #e9a8b6;
      --rose-deep: #cf7f92;
      --text: #6b4c57;
      --shadow: 0 18px 50px rgba(207, 127, 146, 0.18);
      --radius-xl: 28px;
      --radius-lg: 22px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background:
        radial-gradient(circle at top, rgba(248, 215, 223, 0.55), transparent 34%),
        linear-gradient(180deg, var(--soft-white) 0%, var(--cream) 100%);
      color: var(--text);
      overflow: hidden;
    }

    body {
      position: relative;
    }

    .hearts {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .heart {
      position: absolute;
      bottom: -40px;
      color: rgba(233, 168, 182, 0.48);
      font-size: clamp(14px, 2vw, 22px);
      animation: floatUp linear infinite;
      filter: blur(0.2px);
      user-select: none;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(0.9) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translateY(-115vh) scale(1.2) rotate(18deg);
        opacity: 0;
      }
    }

    .app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .panel {
      width: min(100%, 760px);
      background: rgba(255, 253, 251, 0.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: clamp(28px, 5vw, 56px);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      transition: opacity 0.55s ease, transform 0.55s ease, visibility 0.55s ease;
    }

    .stage {
      position: absolute;
      inset: 50% auto auto 50%;
      transform: translate(-50%, -50%);
      width: min(calc(100% - 32px), 760px);
      opacity: 1;
      visibility: visible;
    }

    .stage.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translate(-50%, -48%);
    }

    .eyebrow {
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.72;
      margin-bottom: -4px;
    }

    h1 {
      margin: 0;
      font-family: 'Dancing Script', cursive;
      font-weight: 700;
      font-size: clamp(2.4rem, 7vw, 4.6rem);
      line-height: 1.05;
      color: #b15d71;
      text-wrap: balance;
    }

    h2 {
      margin: 0;
      font-family: 'Dancing Script', cursive;
      font-weight: 700;
      font-size: clamp(2rem, 6vw, 3.5rem);
      line-height: 1.1;
      color: #b15d71;
      text-wrap: balance;
    }

    p {
      margin: 0;
      max-width: 580px;
      font-size: clamp(1rem, 2.8vw, 1.15rem);
      line-height: 1.75;
      color: var(--text);
      text-wrap: balance;
    }

    .cta {
      margin-top: 10px;
      border: none;
      background: linear-gradient(180deg, #f3b9c6 0%, #e9a8b6 100%);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      padding: 16px 28px;
      min-height: 56px;
      min-width: 230px;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 14px 30px rgba(233, 168, 182, 0.35);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      animation: pulse 1.9s infinite;
    }

    .cta:hover,
    .cta:focus-visible {
      transform: translateY(-1px) scale(1.02);
      box-shadow: 0 18px 34px rgba(233, 168, 182, 0.42);
      outline: none;
    }

    .cta:active {
      transform: scale(0.98);
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 14px 30px rgba(233, 168, 182, 0.35);
      }
      50% {
        transform: scale(1.04);
        box-shadow: 0 18px 36px rgba(233, 168, 182, 0.46);
      }
    }

    .video-shell {
      width: 100%;
      display: grid;
      gap: 16px;
      margin-top: 4px;
    }

    .video-frame {
      width: 100%;
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid rgba(233, 168, 182, 0.35);
      border-radius: var(--radius-lg);
      box-shadow: 0 14px 34px rgba(177, 93, 113, 0.12);
      padding: 12px;
    }

    .video-ratio {
      position: relative;
      width: 100%;
      aspect-ratio: 9 / 16;
      max-height: 72vh;
      border-radius: 18px;
      overflow: hidden;
      background:
        linear-gradient(145deg, rgba(248, 215, 223, 0.5), rgba(255, 255, 255, 0.92));
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      background: #f4e6ea;
      border-radius: 18px;
    }

    .signature {
      font-size: 1rem;
      color: #9a6f7a;
      margin-top: 4px;
    }

    .back-link {
      margin-top: 8px;
      background: none;
      border: none;
      color: var(--rose-deep);
      font-size: 0.98rem;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 4px;
      padding: 10px 14px;
      border-radius: 999px;
    }

    .back-link:hover,
    .back-link:focus-visible {
      outline: none;
      background: rgba(233, 168, 182, 0.12);
    }

    @media (min-width: 768px) {
      .video-ratio {
        aspect-ratio: 16 / 9;
      }
    }

    @media (max-width: 480px) {
      .panel {
        padding: 24px 18px;
        gap: 16px;
      }

      p {
        font-size: 0.98rem;
        line-height: 1.7;
      }

      .cta {
        width: 100%;
        min-width: 0;
      }

      .video-frame {
        padding: 10px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <div class="hearts" aria-hidden="true">
    <span class="heart" style="left: 7%; animation-duration: 11s; animation-delay: 0s;">❤</span>
    <span class="heart" style="left: 16%; animation-duration: 13s; animation-delay: 2s;">❤</span>
    <span class="heart" style="left: 28%; animation-duration: 10s; animation-delay: 4s;">❤</span>
    <span class="heart" style="left: 39%; animation-duration: 14s; animation-delay: 1.5s;">❤</span>
    <span class="heart" style="left: 52%; animation-duration: 12s; animation-delay: 5s;">❤</span>
    <span class="heart" style="left: 64%; animation-duration: 15s; animation-delay: 3s;">❤</span>
    <span class="heart" style="left: 76%; animation-duration: 11s; animation-delay: 6s;">❤</span>
    <span class="heart" style="left: 88%; animation-duration: 13.5s; animation-delay: 2.5s;">❤</span>
  </div>

  <main class="app">
    <section id="stage1" class="stage panel" aria-labelledby="greeting-title">
      <div class="eyebrow">For my favorite person</div>
      <h1 id="greeting-title">WELCOME HOME, BABY! 🏠❤️</h1>
      <p>I missed you SO much these past few days. Hearing from you makes my world complete.</p>
      <button class="cta" id="surpriseBtn" type="button">Click for a surprise...</button>
    </section>

    <section id="stage2" class="stage panel hidden" aria-labelledby="reveal-title">
      <div class="eyebrow">Just for you</div>
      <h2 id="reveal-title">A little something I made for you...</h2>

      <div class="video-shell">
        <div class="video-frame">
          <div class="video-ratio">
            <video controls playsinline preload="metadata" width="100%">
              <source src="video/welcomeback.mp4" type="video/mp4">
              Browser kamu tidak mendukung video.
            </video>
          </div>
        </div>
        <p class="signature">Always yours, William Luvianus</p>
      </div>

      <button class="back-link" id="backBtn" type="button">Back to Greeting</button>
    </section>
  </main>

  <script>
    const stage1 = document.getElementById('stage1');
    const stage2 = document.getElementById('stage2');
    const surpriseBtn = document.getElementById('surpriseBtn');
    const backBtn = document.getElementById('backBtn');

    function showStage(target) {
      const showingGreeting = target === 'greeting';
      stage1.classList.toggle('hidden', !showingGreeting);
      stage2.classList.toggle('hidden', showingGreeting);
    }

    surpriseBtn.addEventListener('click', () => showStage('video'));
    backBtn.addEventListener('click', () => showStage('greeting'));
  </script>
</body>
</html>
